---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
  namespace: security
spec:
  interval: 15m
  chart:
    spec:
      chart: pocket-id
      version: 1.7.6
      sourceRef:
        kind: HelmRepository
        name: anza-labs
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    pocketID:
      image:
        # -- Registry and repository for the pocket-id image.
        repository: ghcr.io/pocket-id/pocket-id
        # -- Tag for the image.
        tag: "v2.3.0"
        # -- Image pull policy.
        pullPolicy: IfNotPresent
