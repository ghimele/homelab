---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kube-system
spec:
  values:
    initContainers:
      - # Create plugins directory with proper permissions
        command:
          - /bin/sh
          - -c
          - mkdir -p /home/headlamp/.config/Headlamp/plugins /home/headlamp/.config/Headlamp/kubeconfigs && chown -R 100:100 /home/headlamp/.config/Headlamp
        image: alpine:latest
        name: create-plugins-dir
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        volumeMounts:
          - mountPath: /home/headlamp/.config/Headlamp
            name: headlamp-config
      - # Generate kubeconfig file. Can be removed when https://github.com/kubernetes-sigs/headlamp/issues/1826 is resolved
        command:
          - /bin/sh
          - "-c"
          - |
            kubectl config set-cluster main --server=https://kubernetes.default.svc --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            kubectl config set-credentials main --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            kubectl config set-context main --cluster=main --user=main
            kubectl config use-context main
        env:
          - name: KUBERNETES_SERVICE_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: KUBERNETES_SERVICE_PORT
            value: "6443"
          - name: KUBECONFIG
            value: /home/headlamp/.config/Headlamp/kubeconfigs/config
        image: alpine/kubectl:1.35.2
        name: create-kubeconfig
        securityContext:
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 101
          runAsNonRoot: true
          runAsUser: 100
        volumeMounts:
          - mountPath: /home/headlamp/.config/Headlamp/kubeconfigs
            name: headlamp-config
            readOnly: false
    config:
      oidc:
        clientID: ${HEADLAMP_POCKETID_CLIENTID}
        clientSecret: ${HEADLAMP_POCKETID_CLIENTSECRET}
        issuerURL: ${HEADLAMP_POCKETID_ISSUERURL}
        scopes: "email,profile"
    volumeMounts:
      - mountPath: "/home/headlamp/.config/Headlamp/"
        name: headlamp-config
    volumes:
      - name: headlamp-config
        emptyDir: {}

    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.5.0
      baseImage: node:lts-alpine
