apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: ai
spec:
  interval: 10m
  values:
    ollama:
      enabled: false
    pipelines:
      enabled: false
    tika:
      enabled: false
    websocket:
      enabled: false
    persistence:
      enabled: true
      existingClaim: open-webui-pvc