apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: ai
spec:
  interval: 10m
  values:
    image:
      # -- Open WebUI image repository
      # @section -- Image configuration
      repository: ghcr.io/open-webui/open-webui
      # -- Open WebUI image tag (Open WebUI image tags can be found here: https://github.com/open-webui/open-webui)
      # @section -- Image configuration
      tag: "v0.8.11"
      # -- Open WebUI image pull policy
      # @section -- Image configuration
      pullPolicy: "IfNotPresent"
      # -- Use a slim version of the Open WebUI image
      # @section -- Image configuration
      useSlim: false
    ollama:
      enabled: false
    pipelines:
      enabled: false
    tika:
      enabled: false
    websocket:
      enabled: false
    persistence:
      enabled: true
      existingClaim: open-webui-pvc