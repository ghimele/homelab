---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
  namespace: home-automation
spec:
  interval: 10m
  values:
    configMaps:
      config:
        data:
          mosquitto.conf: |-
            allow_anonymous true
            autosave_interval 60
            connection_messages false
            listener 1883
            per_listener_settings false
            persistence true
            persistence_location /config
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: mosquitto-pvc
        # advancedMounts:
        #   mosquitto:
        #     app:
        #       - path: /mosquitto/config
        #         subPath: config
        #       - path: /mosquitto/data
        #         subPath: data
        #       - path: /mosquitto/log
        #         subPath: log
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf

    service:
      app:
        controller: mosquitto
        type: ClusterIP
        ports:
          mqtt:
            port: 1883
          websocket:
            port: 9001
