---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
  namespace: home-automation
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      mosquitto:
        pod:
          securityContext:
            runAsUser: 1883
            runAsGroup: 1883
            fsGroup: 1883
            runAsNonRoot: true
        containers:
          app:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.21
            env:
              TZ: ${TIMEZONE}
            args:
              - /mosquitto-no-auth.conf
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      app:
        ports:
          mqtt:
            port: 1883
          websocket:
            port: 9001
